<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Autenticando...</title>
<style>
  body { font-family: Arial, sans-serif; background: #0d1b2a; color: #fff;
         display: flex; align-items: center; justify-content: center;
         height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #334155;
             border-top-color: #3b82f6; border-radius: 50%;
             animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #94a3b8; font-size: 14px; }
</style>
</head>
<body>
<div class="spinner"></div>
<p>Autenticando com Google...</p>
<script>
(function(){
  // PKCE: Google retorna ?code=...&state=... na query string
  var params = {};
  location.search.replace(/^\?/,'').split('&').filter(Boolean).forEach(function(p){
    var idx = p.indexOf('=');
    if(idx > 0) params[p.substring(0,idx)] = decodeURIComponent(p.substring(idx+1));
  });

  var base = 'https://engvivianbongiorno-eng.github.io/index.html';

  if(params.code){
    // Sucesso — redireciona para index com code e state na query
    location.replace(base + '?code=' + encodeURIComponent(params.code) +
      (params.state ? '&state=' + encodeURIComponent(params.state) : ''));
  } else if(params.error){
    // Erro ou cancelamento
    location.replace(base + '?error=' + encodeURIComponent(params.error));
  } else {
    // Fallback: sem code nem erro — volta para index limpo
    location.replace(base);
  }
})();
</script>
</body>
</html>
