<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body>
<script>
  // Esta página recebe o token do Google OAuth e salva no localStorage
  // antes de redirecionar de volta para o app principal
  var hash = {};
  location.hash.replace(/^#/,'').split('&').filter(Boolean).forEach(function(p){
    var idx = p.indexOf('=');
    if(idx > 0) hash[p.substring(0,idx)] = decodeURIComponent(p.substring(idx+1));
  });

  if(hash.access_token){
    // Salvar token e dados no localStorage
    localStorage.setItem('oauth_token', hash.access_token);
    // Redirecionar para o app
    location.replace('https://engvivianbongiorno-eng.github.io/index.html');
  } else {
    // Sem token — voltar para o app sinalizando cancelamento
    localStorage.setItem('oauth_cancelled', '1');
    location.replace('https://engvivianbongiorno-eng.github.io/index.html');
  }
</script>
</body>
</html>
